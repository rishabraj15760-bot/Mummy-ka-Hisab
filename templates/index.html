<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Expense Manager</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>🏠 Home Expense Manager</h1>
    <p class="welcome">Welcome, Mumma! ❤️
Let's manage this month's expenses together.</p>

    <div class="card expense-card">
        <h2>💸 Today's Expense</h2>
        <h3>₹{{ total }}</h3>
    </div>

    <div class="card budget-card">
        <h2>💰 Monthly Budget</h2>
        <h3>₹{{ budget }}</h3>
    </div>

    <div class="card remaining-card">
        <h2>🏦 Remaining Budget</h2>
        <h3>₹{{ remaining }}</h3>
    </div>

    <div class="buttons">

        <a href="/add">
            <button>Add Expense</button>
        </a>

        <a href="/history">
            <button>View History</button>
        </a>

        <a href="/budget">
            <button>Set Monthly Budget</button>
        </a>
<p style="text-align:center; margin-top:30px; color:#666; font-size:14px;">
    Made with ❤️ by Rishav
    <br>
    Version 1.0
</p>
    </div>

</div>

</body>
</html>
