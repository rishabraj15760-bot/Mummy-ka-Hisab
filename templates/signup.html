<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Home Expense Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>🏠 Home Expense Manager</h1>
    <p class="welcome">Create your account ❤️</p>

    <div class="card">
        <form method="POST" action="/signup">
            <input type="text" name="name" placeholder="Name" required style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
            <input type="email" name="email" placeholder="Email" required style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
            <input type="password" name="password" placeholder="Password" required style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">

            {% if error %}
                <p style="color:red; text-align:center;">{{ error }}</p>
            {% endif %}

            <button type="submit" style="width:100%;">Sign Up</button>
        </form>
    </div>

    <p style="text-align:center; margin-top:20px;">
        Already have an account? <a href="/login">Login</a>
    </p>

</div>

</body>
</html>
